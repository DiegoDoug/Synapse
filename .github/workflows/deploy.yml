name: Deploy

# Build + push container images, then deploy.
#   * Feature branches  -> staging only (automatic)
#   * main              -> production    (manual approval gate)
# Manual approval is enforced by the GitHub "production" Environment protection
# rule (configure required reviewers in repo Settings -> Environments).
on:
  push:
    branches:
      - main
      - "feature/**"
      - "stage-**"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  # ---- 1. Build + push images ------------------------------------------------
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- 2. Deploy to staging (feature branches) ------------------------------
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref != 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            git fetch --all && git checkout ${{ github.sha }}
            export REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            ./scripts/deploy-staging.sh
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

  # ---- 3. Deploy to production (main only, manual approval) ------------------
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.example.com
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            git fetch --all && git checkout ${{ github.sha }}
            export REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            ./scripts/deploy-prod.sh
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
