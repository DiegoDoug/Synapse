name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Fail-fast pipeline: lint -> tests -> security scan -> image build.
# Lint and tests gate everything; a red check blocks the merge.
jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Tests (pytest)
        run: python -m pytest backend/tests/

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Lint (eslint)
        run: npm run lint

  security-scan:
    name: Security scan (dependencies)
    runs-on: ubuntu-latest
    # Run regardless of lint/test outcome so a vuln report is always produced,
    # but the job itself fails on a known-vulnerable dependency.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt --strict --desc

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit npm dependencies
        working-directory: frontend
        # High/critical advisories fail the job; lower severities are reported.
        run: npm audit --audit-level=high

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: synapse/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: synapse/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
