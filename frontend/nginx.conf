# Static SPA server for the Synapse frontend container (Stage 8).
# TLS, HTTP->HTTPS redirect, and /api routing are handled by the upstream
# reverse proxy (nginx/) — this server only serves the compiled bundle.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for fingerprinted assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths return index.html so client routing
    # (React Router) can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entrypoint so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
