# Production stack for Synapse / Personal OS (Stage 8).
#
# Boots the entire system from zero:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Services:
#   proxy     - nginx reverse proxy + TLS termination (the only public entrypoint)
#   frontend  - static SPA served by nginx (internal)
#   backend   - FastAPI API (uvicorn, stateless, scheduler disabled here)
#   worker    - automation/scheduler process (owns cron + workflow jobs)
#   postgres  - production database (persistent volume)
#   redis     - shared cache / rate-limit backend
#
# Networking isolation:
#   edge     - proxy <-> frontend/backend (and the published 80/443 ports)
#   internal - backend/worker <-> postgres/redis (no host port exposure)

name: synapse-prod

x-app-env: &app-env
  env_file:
    - .env.production

x-restart: &restart
  restart: unless-stopped

services:
  proxy:
    image: nginx:1.27-alpine
    <<: *restart
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  frontend:
    image: ${REGISTRY:-synapse}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    <<: *restart
    expose:
      - "80"
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  backend:
    image: ${REGISTRY:-synapse}/backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    <<: [*app-env, *restart]
    environment:
      # The API stays stateless; the worker owns the scheduler.
      SCHEDULER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - edge
      - internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  worker:
    image: ${REGISTRY:-synapse}/backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.worker"]
    <<: [*app-env, *restart]
    environment:
      SCHEDULER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      # Liveness: the python process is running its main module.
      test: ["CMD", "pgrep", "-f", "backend.worker"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      # Initialize the cluster with a sane locale + checksum data pages.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

  redis:
    image: redis:7-alpine
    <<: *restart
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  redis-data:
  certbot-webroot:
