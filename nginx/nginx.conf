# Reverse proxy main config for Synapse (Stage 8).
# TLS termination + routing live in conf.d/default.conf. This file sets global
# worker, logging, and proxy defaults shared across servers.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured-ish access log carrying the propagated request id, so proxy
    # logs correlate with the backend's JSON logs (Stage 8 tracing).
    log_format main '$remote_addr - $remote_user [$time_iso8601] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rid=$http_x_request_id rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;          # do not leak nginx version
    client_max_body_size 12m;   # matches backend upload caps (voice/docs)

    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # Shared proxy headers (incl. request-id propagation to the backend).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $http_x_request_id;

    include /etc/nginx/conf.d/*.conf;
}
