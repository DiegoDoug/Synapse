# Routing + TLS for Synapse (Stage 8).
#   /api    -> backend  (FastAPI, uvicorn :8000)
#   /metrics-> backend  (Prometheus scrape; restrict at the network layer)
#   /        -> frontend (static SPA, nginx :80)
# HTTP is redirected to HTTPS except the ACME challenge + the proxy healthcheck.

upstream synapse_backend {
    server backend:8000;
    keepalive 32;
}

upstream synapse_frontend {
    server frontend:80;
    keepalive 16;
}

# ---- HTTP :80 — redirect to HTTPS (and serve ACME + healthcheck) -----------
server {
    listen 80;
    server_name _;

    # Proxy liveness (used by the compose healthcheck) — must stay on HTTP.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt HTTP-01 challenge webroot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — main entrypoint ------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Certificates: Let's Encrypt in production, self-signed fallback locally.
    # scripts/generate-self-signed-cert.sh writes these paths.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — enforce HTTPS for two years (the backend also sets this when
    # SECURITY_HEADERS_ENABLED=true; harmless to set in both places).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # API -> backend.
    location /api/ {
        proxy_pass http://synapse_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # WebSocket upgrade support (Stage 4.7 voice /api/v1/voice/ws).
        proxy_set_header Upgrade $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Prometheus scrape endpoint (lives at the app root, not under /api).
    # Exposed here for in-cluster scraping; restrict by IP/network in real infra.
    location = /metrics {
        proxy_pass http://synapse_backend;
    }

    # Everything else -> the static SPA.
    location / {
        proxy_pass http://synapse_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
